<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synergy RK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #statusDot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white">

    <nav class="fixed w-full glass p-4 flex justify-between items-center z-50">
        <div class="font-bold text-xl">SYNERGY RK</div>
        <div class="glass px-4 py-1 rounded-full text-xs flex items-center gap-2">
            <span id="statusDot" class="bg-red-500"></span>
            <span id="statusText">CONNECTING...</span>
        </div>
    </nav>

    <section class="h-screen flex flex-col justify-center items-center px-6">
        <h1 class="text-6xl font-black text-center mb-4">DIGITAL <span class="text-[#42ffb6]">SOLUTIONS</span></h1>
        <button onclick="document.getElementById('booking').scrollIntoView({behavior:'smooth'})" class="bg-[#42ffb6] text-black px-8 py-3 rounded-full font-bold">BOOK NOW</button>
    </section>

    <section id="booking" class="py-20 flex justify-center">
        <form id="bookForm" class="glass p-8 rounded-2xl w-full max-w-md space-y-4">
            <input type="text" id="name" placeholder="Name" required class="w-full bg-white/5 p-3 rounded-lg border border-white/10 outline-none focus:border-[#42ffb6]">
            <input type="email" id="email" placeholder="Email" required class="w-full bg-white/5 p-3 rounded-lg border border-white/10 outline-none focus:border-[#42ffb6]">
            <textarea id="details" placeholder="Project Details" class="w-full bg-white/5 p-3 rounded-lg border border-white/10 outline-none focus:border-[#42ffb6]"></textarea>
            <button id="subBtn" type="submit" class="w-full bg-[#42ffb6] text-black py-3 rounded-lg font-bold">SUBMIT</button>
        </form>
    </section>
    <script>
      // DIRECT RENDER URL (Hardcoded to fix the 307 Redirect error)
      const API_BASE = 'https://synergyrk-backend-final.onrender.com';
  
      const checkStatus = async () => {
          const dot = document.getElementById('statusDot');
          const text = document.getElementById('statusText');
          try {
              // Give Render 60 seconds to "wake up"
              const res = await fetch(`${API_BASE}/api/stats`, { signal: AbortSignal.timeout(60000) });
              const data = await res.json();
              if (data.status === 'online') {
                  dot.style.background = '#42ffb6';
                  text.textContent = 'BACKEND ONLINE';
              }
          } catch (err) {
              dot.style.background = '#ff4242';
              text.textContent = 'BACKEND OFFLINE';
              setTimeout(checkStatus, 5000); // Retry every 5 seconds until it wakes up
          }
      };
      checkStatus();
  
      // Booking Form Submission
      document.getElementById('bookForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const btn = e.target.querySelector('button');
          btn.disabled = true;
          btn.textContent = "SENDING...";
          try {
              const res = await fetch(`${API_BASE}/api/book`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                      name: document.getElementById('name').value,
                      email: document.getElementById('email').value,
                      details: document.getElementById('details').value
                  })
              });
              if (res.ok) alert("Booking Successful!");
          } catch (err) { alert("Error: Backend is still waking up."); }
          finally { btn.disabled = false; btn.textContent = "COMPLETE BOOKING"; }
      });
  </script>s


          
</body>
</html>
